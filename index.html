<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsuki Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <div class="container">
        <h1>Tsuki Calendar</h1>
        <p>Select your start and end dates on the calendar to log a cycle.</p>
        
        <input type="text" id="calendar" placeholder="Select dates...">
        
        <div class="info">
            <h3>Estimated Next Start: <br><span id="prediction">Not enough data</span></h3>
        </div>
        
        <button id="clearBtn">Clear History</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="script.js"></script>
</body>
</html>
